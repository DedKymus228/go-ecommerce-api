version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/repository/db/query/"
    schema: "internal/migrations/"
    gen:
      go:
        package: "db"
        out: "internal/repository/db/sqlc"
        sql_package: "pgx/v5"
        emit_interface: true
        overrides:
          - db_type: uuid
            go_type:
              import: "github.com/google/uuid"
              package: "uuid"
              type: "UUID"
